<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — Nairobi Transit</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'DM Sans', 'Segoe UI', sans-serif;
        background: #080D18;
        color: #E0E6F0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }
      .icon  { font-size: 4rem; margin-bottom: 1.5rem; }
      h1     { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem; }
      p      { font-size: 14px; color: #6A7899; margin-bottom: 2rem; line-height: 1.6; }
      button {
        background: #00C896;
        color: #000;
        border: none;
        border-radius: 12px;
        padding: 0.85rem 2rem;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="icon">🚌</div>
    <h1>You're offline</h1>
    <p>
      No internet connection right now.<br />
      Check your data or Wi-Fi and try again.
    </p>
    <button onclick="window.location.reload()">Try again</button>
  </body>
</html>
