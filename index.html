<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary meta ── -->
    <title>MetroAP</title>
    <meta name="description" content="Real-time bus tracking for Nairobi: know before you go." />

    <!-- ── Theme colour (browser chrome on Android) ── -->
    <meta name="theme-color" content="#080D18" />

    <!-- ── PWA / Apple ── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NBO Transit" />

    <!-- ── Apple touch icons ── -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />

    <!-- ── Open Graph (share previews) ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="MetroAP" />
    <meta property="og:description" content="Real-time bus tracking for Nairobi" />
    <meta property="og:image"       content="/icons/icon-512.png" />

    <!-- ── Preconnect for Google Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
